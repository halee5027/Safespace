version: '3.9'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: safespace-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: safespaceai

  # Python AI Services
  ai-services:
    build:
      context: .
      dockerfile: aiservices/Dockerfile
    container_name: safespace-ai
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - mongodb

  # Node.js Backend
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: safespace-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/safespaceai
      - AI_SERVICE_URL=http://ai-services:8000
      - CLIENT_ORIGIN=http://localhost:3000
      - NODE_ENV=production
    depends_on:
      - mongodb
      - ai-services

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: safespace-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend

volumes:
  mongodb_data:
